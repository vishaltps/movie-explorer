services:
  backend:
    build:
      context: ./backend
    command: >
      sh -c "mkdir -p data
      && uv run alembic upgrade head
      && uv run python -m app.seed
      && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      ENV: development
      DATABASE_URL: sqlite:///./data/movies.db
      CORS_ORIGINS: '["http://localhost:8080","http://frontend"]'
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
