name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  frontend:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Start backend for contract generation
        working-directory: backend
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/movie-explorer-backend.pid

      - name: Wait for backend
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/api/v1/health"
          for _ in range(30):
              try:
                  with urllib.request.urlopen(url) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("Backend failed to start")
          PY

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Regenerate API types
        working-directory: frontend
        run: npm run gen:types

      - name: Check generated types are committed
        run: git diff --exit-code -- frontend/src/shared/types/api-generated.ts

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/movie-explorer-backend.pid ]; then
            kill "$(cat /tmp/movie-explorer-backend.pid)" || true
          fi
